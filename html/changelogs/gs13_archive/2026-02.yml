      Collar Receiver (explained below). Anything that the wearer eats gets transported
      to the wearer of the receiver. Works with food, beaker reagents, and the feeding
      tube. Is unlocked with nutritech tools. You can right click it to unlink it.
      Comes in locked and unlocked variant.'
