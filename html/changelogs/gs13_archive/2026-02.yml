      eaten, drunk, and pumped into by feeding tube from linked bluespace collar transmitters.
      The Receiver once a transmitter is linked to it, it cannot be unlinked except
      via the transmitter collar. Will ignore fullness. Is unlocked with nutritech
      tools. Comes in locked and unlocked variant.'
